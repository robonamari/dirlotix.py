name: Auto Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install gettext (compile translations)
        run: sudo apt-get install -y gettext
      - name: Build .mo files (clean rebuild)
        run: |
          find languages -name "*.po" | while read -r po; do
            mo="${po%.po}.mo"
            rm -f "$mo"
            msgfmt "$po" -o "$mo"
          done
      - name: Create clean release archive
        run: |
          set -e
          mkdir -p dist
          zip -rq "dist/Dirlotix-${GITHUB_REF_NAME}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "dist/*" \
            -x "languages/**/*.po" \
            -x "languages/**/*.pot" \
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/Dirlotix-${{ github.ref_name }}.zip
